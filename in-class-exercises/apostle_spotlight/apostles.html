<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            background: #E8ECED;
            font-family: Arial, Helvetica, sans-serif;
            color: #FFFFFF;
        }
        .card {
            justify-self: center;
            align-self: center;
            margin: 5em;
            width: 70em;
            height: 45em;
            background-image: url(images/christus.webp);
            background-size: 125%;
            background-position: -15em;
            border-style: solid;
            border-color: #000000;
            border-width: 0.5em;
            border-radius: 2em;
        }
        h1, h2 {
            justify-self: center;
        }
        .img {
            border-style: solid;
            border-color: #FFFFFF;
            border-width: 0.5em;
            border-radius: 50%;
            width: 15em;
            justify-self: center;
            align-self: center;
        }
        .img:hover {
            border-style: solid;
            border-color: #35CAAC;
        }
        .presidency {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            justify-content: space-around;
        }
        #item1 {
            grid-column: 2;
        }
        #item1, #item3 {
            width: 8em;
            height: 8em;
        }
        #item2 {
            width: 10em;
            height: 10em;
        }
        .quorum {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }
        .img2 {
            border-style: solid;
            border-color: #FFFFFF;
            border-width: 0.5em;
            border-radius: 50%;
            justify-self: center;
            align-self: center;
            margin-top: 0.5em;
            margin-bottom: 1em;
            width: 6em;
            height: 6em;
        }
        .img2:hover {
            border-style: solid;
            border-color: #35CAAC;
        }
        #item4 {
            grid-column: 2;
        }
        #item5 {
            grid-column: 3;
        }
        #item6 {
            grid-column: 4;
        }
        #item7 {
            grid-column: 5;
        }
        #item8 {
            grid-row: 2;
            grid-column: 2;
        }
        #item9 {
            grid-row: 2;
            grid-column: 3;
        }
        #item10 {
            grid-row: 2;
            grid-column: 4;
        }
        #item11 {
            grid-row: 2;
            grid-column: 5;
        }
        #item12 {
            grid-row: 3;
            grid-column: 2;
        }
        #item13 {
            grid-row: 3;
            grid-column: 3;
        }
        #item14 {
            grid-row: 3;
            grid-column: 4;
        }
        #item15 {
            grid-row: 3;
            grid-column: 5;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
     <section class="card">
        <h1>First Presidency</h1>
            <div class="presidency">
                <img class="img" id="item1" src="images/eyring.webp" alt="Henry B. Eyring">
                <img class="img" id="item2" src="images/oaks.webp" alt="Dallin H. Oaks">
                <img class="img" id="item3" src="images/christofferson.webp" alt="D. Todd Christofferson">
            </div>
        <h2>Quorum of the Twelve Apostles</h2>
            <div class="quorum">
                <img class="img2" id="item4" src="images/uchtdorf.webp" alt="Dieter F. Uchtdorf">
                <img class="img2" id="item5" src="images/bednar.webp" alt="David A. Bednar">
                <img class="img2" id="item6" src="images/cook.webp" alt="Quentin L. Cook">
                <img class="img2" id="item7" src="images/anderson.webp" alt="Neil L. Anderson">
                <img class="img2" id="item8" src="images/rasband.webp" alt="Ronald A. Rasband">
                <img class="img2" id="item9" src="images/stevenson.webp" alt="Gary E. Stevenson">
                <img class="img2" id="item10" src="images/renlund.webp" alt="Dale G. Renlund">
                <img class="img2" id="item11" src="images/gong.webp" alt="Gerrit W. Gong">
                <img class="img2" id="item12" src="images/soares.webp" alt="Ulisses Soares">
                <img class="img2" id="item13" src="images/kearon.webp" alt="Patrick Kearon">
                <img class="img2" id="item14" src="images/causse.webp" alt="Gerald Causse">
                <img class="img2" id="item15" src="images/gilbert.webp" alt="Clark G. Gilbert">
            </div>
     </section>
</body>
</html>
