<!DOCTYPE html>
<html>
    <head>
        <!--Elements in the head DO NOT appear on the page-->
        <title>Chicken Tenders</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap');
            /* This is a CSS comment */
            body{
                background-color: #F54242;
            }
            h1{
                color: #00FFFF;
                font-family: 'Jacquard 12';
            }
            p{
                color: #00FFFF;
                font-family: 'Jacquard 12'
            }
        </style>
        <!--title tag goes up in the tab name-->
    </head>
    <body>
        <!--Elements in the body DO appear on the page-->
        <h1>Ten Chicken Tender Hacks To Change The World</h1>
        <!--h1 to h6 are sequentially decreasing header sizes-->
        <p>Try placing a Chicken Tender in Dr. Pepper for three months.
            Then select your favorite friend and gift it to their mother.</p>
        <!--p tag is for main body paragraphs and text-->
    </body>
</html>
