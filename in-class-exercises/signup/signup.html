<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
            display: flex;
            justify-content: center;
        }

        #formContainer {
            background-color: white;
            border: 12px solid navy;
            border-radius: 24px;
            width: 35%;
        }

        #banner {
            display: flex;
            flex-direction: column;
            background-image: url(images/jesus_feeds_5000.jpeg);
            background-size: cover;
            height: 300px;
            align-items: center;
            justify-content: end;
            border-radius: 12px 12px 0 0;
        }

        h1, h2 {
            color: white;
            text-shadow: 1px 1px black;
            margin: 5px;
        }

        h2 {
            margin-bottom: 15px;
        }

        h3 {
            justify-self: center;
            padding: 10px;
        }

        #closeBtn {
            position: absolute;
            top: 15px;
            left: 32.8%;
        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 0.5fr 1fr;
        }

        .name, .pass, .mail, .gender {
            grid-column: 1 / 3;
            margin: 5px;
            margin-top: 10px;
            margin-bottom: 10px;
            padding-left: 20px;
        }

        #username, #password, #email {
            margin-right: 20px;
            max-height: 15px;
            align-self: center;
        }

        .male, .female {
            margin-right: 20px;
            max-height: 15px;
            align-items: center;
        }

        .genderButtons {
            align-content: center;
        }

        .terms, .news, .submit {
            grid-column: 1 / 4;
            justify-self: center;
            margin: 10px;
        }

        #images {
            display: flex;
            height: 100px;
            justify-content: space-around;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <div id="banner">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label class="name" for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label class="pass" for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label class="mail" for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label class="gender">Gender:</label>
            <div class="genderButtons">
                <input type="radio" id="male" name="gender" value="male" required>
                <label class="male" for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label class="female" for="female">Female</label>
            </div>

            <section class="news">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section class="terms">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section class="submit">
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="images">
            <img src="images/old_testament.webp" alt="">
            <img src="images/new_testament.webp" alt="">
            <img src="images/book_of_mormon.webp" alt="">
            <img src="images/doctrine_and_covenants.webp" alt="">
            <img src="images/pearl_of_great_price.webp" alt="">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
